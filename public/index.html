<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda WFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #2a2a2a;
    --surface2: #222222;
    --border: #333333;
    --border2: #3d3d3d;
    --accent: #cc7a29;
    --accent-hover: #e08a35;
    --accent-faint: rgba(204,122,41,.12);
    --text: #ececec;
    --text2: #b4b4b4;
    --muted: #666666;
    --bubble-user: #cc7a29;
    --bubble-bot: #2a2a2a;
    --danger: #e05252;
    --success: #5ead6e;
    --radius: 18px;
    --radius-sm: 10px;
    --max-w: 720px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex; align-items: center; justify-content: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    position: relative;
  }
  .topbar-title {
    font-size: 14px; font-weight: 500; color: var(--text2);
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── CHAT ── */
  #chat {
    flex: 1; overflow-y: auto;
    padding: 24px 16px 12px;
    display: flex; flex-direction: column; gap: 4px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-group {
    display: flex; flex-direction: column;
    max-width: var(--max-w); width: 100%;
    margin: 0 auto; padding: 4px 0;
  }
  .msg-group.user { align-items: flex-end; }
  .msg-group.bot  { align-items: flex-start; }

  .sender-label {
    font-size: 12px; color: var(--muted);
    margin-bottom: 4px; padding: 0 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .sender-label .avatar-sm {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  .bubble {
    padding: 12px 16px;
    line-height: 1.65;
    font-size: 14.5px;
    max-width: 100%;
    animation: msgIn .25s ease both;
  }
  @keyframes msgIn {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .bubble.bot {
    background: transparent;
    color: var(--text);
    border-radius: 0;
  }
  .bubble.user {
    background: var(--bubble-user);
    color: #fff;
    border-radius: var(--radius);
    border-bottom-right-radius: 4px;
    max-width: 480px;
    box-shadow: 0 2px 12px rgba(204,122,41,.25);
  }
  .bubble strong { font-weight: 600; }
  .bubble em { font-style: italic; color: var(--text2); font-size: 13px; }

  /* ── SLOTS ── */
  .slots-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  .slot-btn {
    padding: 6px 14px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .slot-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }

  /* ── WEEK TABLE ── */
  .week-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  .week-table th {
    background: var(--surface); color: var(--text2); font-weight: 500;
    padding: 8px 12px; text-align: left;
    border-bottom: 1px solid var(--border2);
  }
  .week-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }

  .slot-tag {
    display: inline-block;
    background: var(--surface); color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: 6px; padding: 2px 9px; margin: 2px 2px 2px 0;
    font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .slot-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }

  /* ── CONFIRM CARD ── */
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 16px 18px; margin-top: 12px;
    font-size: 13.5px; line-height: 1.8;
  }
  .confirm-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
  .confirm-card .value { font-weight: 500; color: var(--text); }
  .confirm-card .row   { margin-bottom: 10px; }
  .confirm-card .row:last-child { margin-bottom: 0; }

  /* ── BUTTONS ── */
  .action-btns { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn-primary {
    padding: 9px 20px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary {
    padding: 9px 20px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 8px;
    font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  /* ── TITLE INPUT ── */
  .title-input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border2); border-radius: 8px;
    background: var(--surface2); color: var(--text);
    font-size: 14px; margin-top: 8px; outline: none;
    transition: border-color .15s;
  }
  .title-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(204,122,41,.12); }

  /* ── EMAIL TAGS ── */
  .email-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .email-tag {
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text2); border-radius: 20px; padding: 3px 12px; font-size: 12px;
  }

  /* ── TYPING ── */
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce .8s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── INPUT AREA ── */
  .input-area {
    flex-shrink: 0;
    padding: 12px 16px 20px;
    background: var(--bg);
  }
  .input-inner {
    max-width: var(--max-w); margin: 0 auto;
    display: flex; flex-direction: column; gap: 8px;
  }

  .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .quick-btn {
    padding: 5px 13px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 20px; color: var(--text2);
    font-size: 12px; cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }

  .input-row {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: border-color .15s;
  }
  .input-row:focus-within { border-color: var(--border2); box-shadow: 0 0 0 2px rgba(255,255,255,.04); }

  #userInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14.5px; line-height: 1.5;
    resize: none; max-height: 120px;
    font-family: inherit;
  }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 36px; height: 36px; flex-shrink: 0;
    background: var(--accent); border: none; border-radius: 9px;
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  #sendBtn:hover { background: var(--accent-hover); }
  #sendBtn:disabled { opacity: .3; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; }

  .success-msg { color: var(--success); font-weight: 600; }
  .danger-msg  { color: var(--danger); }
  .date-hint   { font-size: 12px; color: var(--muted); margin-top: 6px; }

  @media(max-width:520px) {
    #chat { padding: 16px 10px 8px; }
    .input-area { padding: 8px 10px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <div class="topbar-dot"></div>
    Agendamento de reuniões — Mesa Consórcio
  </div>
</div>

<div id="chat"></div>

<div class="input-area">
  <div class="input-inner">
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickSend('Quais horários disponíveis hoje?')">📅 Disponibilidade hoje</button>
      <button class="quick-btn" onclick="quickSend('Mostrar disponibilidade desta semana')">📆 Esta semana</button>
      <button class="quick-btn" onclick="quickSend('Quero agendar uma reunião')">＋ Agendar</button>
    </div>
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Pergunte sobre disponibilidade ou agende uma reunião…"></textarea>
      <button id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const CONFIG = {
  defaultEmails: ['joel@wflowinvest.com', 'sabrina.costa@wflowinvest.com'],
  senderEmail:   'sabrina@jtdkinvest.com',
  titleTemplate: 'Apresentação Consórcio – [Nome do Cliente]',
};
const API = '';

let flow = { step:'idle', date:null, time:null, duration:null, emails:[], title:CONFIG.titleTemplate };

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function toISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(d) {
  if (typeof d==='string') { const [y,m,dd]=d.split('-'); d=new Date(+y,+m-1,+dd); }
  return d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtShort(iso) { const [y,m,d]=iso.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'}); }
function fmtHour(h) { return `${String(Math.floor(h)).padStart(2,'0')}:${(h%1)===.5?'30':'00'}`; }
function parseDateFromMsg(msg) { const m=msg.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?/); if(!m)return null; return new Date(m[3]?+m[3]:new Date().getFullYear(),+m[2]-1,+m[1]); }
function parseTimeFromMsg(msg) { const m=msg.match(/(\d{1,2})(?:h|:)(\d{0,2})/i); if(!m)return null; return parseInt(m[1])+(m[2]?parseInt(m[2])||0:0)/60; }
function todayISO() { return toISO(new Date()); }
function weekStartISO() { const d=new Date(); const day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return toISO(d); }

// ═══════════════════════════════════════
//  API
// ═══════════════════════════════════════
async function apiSlots(dateISO) { const r=await fetch(`${API}/api/slots?date=${dateISO}`); return r.json(); }
async function apiWeek(dateISO)  { const r=await fetch(`${API}/api/slots/week?date=${dateISO}`); return r.json(); }
async function apiCheck(dateISO,hora_inicio,duracao) {
  const r=await fetch(`${API}/api/check`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:dateISO,hora_inicio,duracao})});
  return r.json();
}
async function apiBook(payload) {
  const r=await fetch(`${API}/api/agendamentos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  return {ok:r.ok,data:await r.json()};
}

// ═══════════════════════════════════════
//  CHAT UI
// ═══════════════════════════════════════
const chatEl = document.getElementById('chat');

function appendMsg(html, sender='bot') {
  const group = document.createElement('div');
  group.className = `msg-group ${sender}`;

  if (sender === 'bot') {
    const label = document.createElement('div');
    label.className = 'sender-label';
    label.innerHTML = `<span class="avatar-sm">W</span> Agenda WFlow`;
    group.appendChild(label);
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.innerHTML = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  group.appendChild(bubble);
  chatEl.appendChild(group);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const group = document.createElement('div');
  group.className = 'msg-group bot'; group.id = 'typing';
  const label = document.createElement('div');
  label.className = 'sender-label';
  label.innerHTML = `<span class="avatar-sm">W</span> Agenda WFlow`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  group.appendChild(label); group.appendChild(bubble);
  chatEl.appendChild(group); chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
async function botReply(html, delay=600) { showTyping(); await sleep(delay); hideTyping(); appendMsg(html,'bot'); }

function slotsHtml(slots, dateISO) {
  if (!slots||!slots.length) return '<span class="danger-msg">Nenhum horário disponível neste dia.</span>';
  return `<div class="slots-grid">${slots.map(h=>`<button class="slot-btn" onclick="slotChosen('${dateISO}',${h})">${fmtHour(h)}</button>`).join('')}</div>`;
}

// ═══════════════════════════════════════
//  INTENT
// ═══════════════════════════════════════
function detectIntent(msg) {
  const m = msg.toLowerCase();
  if (/semana|week/.test(m)) return 'week';
  if (/agendar|marcar|reunião|meeting/.test(m)) return 'book';
  if (/horário|disponib|livre|vaga|hoje/.test(m)) return 'slots';
  return 'unknown';
}

// ═══════════════════════════════════════
//  HANDLERS
// ═══════════════════════════════════════
async function handleQuery(msg) {
  // detecta "semana que vem"
if (/semana que vem|próxima semana|proxima semana/.test(msg.toLowerCase())) {
  const nextMonday = new Date();
  nextMonday.setDate(nextMonday.getDate() + (8 - nextMonday.getDay()) % 7 || 7);
  const iso = toISO(nextMonday);
  const res = await apiWeek(iso);
  if (!res.week) { await botReply('Erro ao consultar semana. Tente novamente.'); return; }
  let rows = '';
  res.week.forEach(({date:d,slots}) => {
    const tags = slots.length
      ? slots.map(h=>`<span class="slot-tag" onclick="slotChosen('${d}',${h})">${fmtHour(h)}</span>`).join('')
      : '<em style="color:var(--muted)">Sem disponibilidade</em>';
    rows += `<tr><td><strong>${fmtShort(d)}</strong></td><td>${tags}</td></tr>`;
  });
  await botReply(`**Disponibilidade da semana que vem:**<br><br>
    <table class="week-table">
      <thead><tr><th>Dia</th><th>Horários disponíveis</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="date-hint">Clique em um horário para agendar diretamente.</div>`);
  return;
}const intent = detectIntent(msg);

  if (intent === 'week') {
    const date = parseDateFromMsg(msg);
    const iso = date ? toISO(date) : weekStartISO();
    const res = await apiWeek(iso);
    if (!res.week) { await botReply('Erro ao consultar semana. Tente novamente.'); return; }
    let rows = '';
    res.week.forEach(({date:d,slots}) => {
      const tags = slots.length
        ? slots.map(h=>`<span class="slot-tag" onclick="slotChosen('${d}',${h})">${fmtHour(h)}</span>`).join('')
        : '<em style="color:var(--muted)">Sem disponibilidade</em>';
      rows += `<tr><td><strong>${fmtShort(d)}</strong></td><td>${tags}</td></tr>`;
    });
    await botReply(`**Disponibilidade da semana:**<br><br>
      <table class="week-table">
        <thead><tr><th>Dia</th><th>Horários disponíveis</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="date-hint">Clique em um horário para agendar diretamente.</div>`);
    return;
  }

  if (intent === 'slots') {
    const date = parseDateFromMsg(msg);
    const iso = date ? toISO(date) : todayISO();
    const res = await apiSlots(iso);
    await botReply(`**${fmtDate(iso)}**<br><br>${slotsHtml(res.slots, iso)}<div class="date-hint">Clique em um horário para agendar.</div>`);
    flow.date = iso; flow.step = 'choose_slot';
    return;
  }

  if (intent === 'book') {
    const date = parseDateFromMsg(msg);
    const time = parseTimeFromMsg(msg);
    if (date && time !== null) {
      await attemptBook(toISO(date), time);
    } else if (date) {
      const iso = toISO(date);
      flow.date = iso; flow.step = 'choose_slot';
      const res = await apiSlots(iso);
      await botReply(`**${fmtDate(iso)}** — escolha um horário:<br><br>${slotsHtml(res.slots, iso)}`);
    } else {
      await botReply('Para agendar, informe data e horário.<br>Exemplo: <em>"Agendar dia 10/03/2026 às 14h"</em>');
    }
    return;
  }

  await botReply(`Posso ajudar com:<br><br>
    • <strong>Disponibilidade de um dia</strong> — ex: <em>"horários do dia 10/03/2026"</em><br>
    • <strong>Disponibilidade da semana</strong> — ex: <em>"semana do dia 03/03/2026"</em><br>
    • <strong>Agendar reunião</strong> — ex: <em>"agendar dia 10/03/2026 às 14h"</em>`);
}

async function attemptBook(iso, time) {
  const check = await apiCheck(iso, time, 0.5);
  if (!check.disponivel) {
    const motivos = { fim_de_semana:'este dia é fim de semana', fora_do_horario:'horário fora do período permitido (09:00–18:00)', horario_almoco:'das 12:00 às 14:00 é horário de almoço', conflito:'este horário já está ocupado' };
    const res = await apiSlots(iso);
    await botReply(`**${fmtHour(time)}** não está disponível — ${motivos[check.motivo]||'indisponível'}.<br><br>Horários disponíveis em **${fmtDate(iso)}**:<br>${slotsHtml(res.slots, iso)}`, 800);
    flow.date = iso; flow.step = 'choose_slot'; return;
  }
  flow.date = iso; flow.time = time;
  await askEmails();
}

async function slotChosen(iso, h) {
  flow.date = iso; flow.time = h;
  appendMsg(`${fmtDate(iso)} às ${fmtHour(h)}`, 'user');
  await askEmails();
}

async function askEmails() {
  flow.step = 'collect_emails';
  await botReply(`**${fmtHour(flow.time)}** de **${fmtDate(flow.date)}** está disponível! ✓<br><br>
    Quais e-mails adicionais incluir no convite?<br>
    <em>Os abaixo já são incluídos automaticamente:</em>
    <div class="email-tags" style="margin-top:10px">
      ${CONFIG.defaultEmails.map(e=>`<span class="email-tag">${e}</span>`).join('')}
    </div>
    <div class="date-hint">Digite os e-mails separados por vírgula, ou "nenhum" para continuar.</div>`, 600);
}

async function handleEmailStep(msg) {
  const lower = msg.trim().toLowerCase();
  flow.emails = (lower==='nenhum'||lower==='não'||lower==='nao') ? [] : msg.split(/[,;\s]+/).map(e=>e.trim()).filter(e=>e.includes('@'));
  flow.step = 'collect_duration';
  await botReply(`Qual será a duração da reunião?<br><br>
    <div class="slots-grid">
      <button class="slot-btn" onclick="durationChosen(0.5)">30 minutos</button>
      <button class="slot-btn" onclick="durationChosen(1)">1 hora</button>
    </div>`, 500);
}

async function durationChosen(dur) {
  const check = await apiCheck(flow.date, flow.time, dur);
  if (!check.disponivel) {
    const res = await apiSlots(flow.date);
    await botReply(`Não há espaço para **${dur===1?'1 hora':'30 minutos'}** a partir das **${fmtHour(flow.time)}**.<br><br>Escolha outro horário:${slotsHtml(res.slots, flow.date)}`, 500);
    flow.step = 'choose_slot'; return;
  }
  flow.duration = dur;
  appendMsg(dur===0.5?'30 minutos':'1 hora','user');
  flow.step = 'collect_title';
  await botReply(`Qual será o título da reunião?<br>
    <em>Sugestão — edite o nome do cliente:</em>
    <input class="title-input" id="titleField" type="text" value="${CONFIG.titleTemplate}">
    <div class="action-btns">
      <button class="btn-primary" onclick="titleConfirmed()">Confirmar título →</button>
    </div>`, 500);
}

async function titleConfirmed() {
  const val = document.getElementById('titleField')?.value?.trim();
  flow.title = val || CONFIG.titleTemplate;
  flow.step = 'confirm';
  await showConfirmation();
}

async function showConfirmation() {
  const allEmails = [...CONFIG.defaultEmails, ...flow.emails];
  await botReply(`
    <div class="confirm-card">
      <div class="row"><div class="label">Título</div><div class="value">${flow.title}</div></div>
      <div class="row"><div class="label">Data</div><div class="value">${fmtDate(flow.date)}</div></div>
      <div class="row"><div class="label">Horário</div><div class="value">${fmtHour(flow.time)} – ${fmtHour(flow.time+flow.duration)}</div></div>
      <div class="row"><div class="label">Duração</div><div class="value">${flow.duration===0.5?'30 minutos':'1 hora'}</div></div>
      <div class="row"><div class="label">Remetente</div><div class="value">${CONFIG.senderEmail}</div></div>
      <div class="row"><div class="label">Convidados</div>
        <div class="email-tags" style="margin-top:8px">
          ${allEmails.map(e=>`<span class="email-tag">${e}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="action-btns">
      <button class="btn-primary" id="confirmBtn" onclick="finalConfirm()">Confirmar agendamento</button>
      <button class="btn-secondary" onclick="cancelFlow()">Cancelar</button>
    </div>`, 600);
}

async function finalConfirm() {
  const btn = document.getElementById('confirmBtn');
  if (btn) { btn.disabled=true; btn.textContent='Salvando…'; }
  const allEmails = [...CONFIG.defaultEmails, ...flow.emails];
  const res = await apiBook({ date:flow.date, hora_inicio:flow.time, duracao:flow.duration, titulo:flow.title, emails:allEmails });
  appendMsg('Confirmar agendamento','user');
  if (res.ok) {
  const meetLink = res.data?.meet_link;
  await botReply(`<span class="success-msg">Reunião agendada com sucesso!</span><br><br>
    <div class="confirm-card">
      <div class="row"><div class="label">Título</div><div class="value">${flow.title}</div></div>
      <div class="row"><div class="label">Data</div><div class="value">${fmtDate(flow.date)}</div></div>
      <div class="row"><div class="label">Horário</div><div class="value">${fmtHour(flow.time)} – ${fmtHour(flow.time+flow.duration)}</div></div>
      <div class="row"><div class="label">Convidados</div>
        <div class="email-tags" style="margin-top:8px">
          ${allEmails.map(e=>`<span class="email-tag">${e}</span>`).join('')}
        </div>
      </div>
      ${meetLink ? `<div class="row"><div class="label">Link da reunião</div><div class="value"><a href="${meetLink}" target="_blank" style="color:var(--accent);text-decoration:none;">🎥 Entrar no Google Meet</a></div></div>` : ''}
    </div>`, 800);
}
  } else {
    await botReply(`<span class="danger-msg">Erro ao salvar: ${res.data?.error||'tente novamente.'}</span>`);
  }
  flow = { step:'idle', date:null, time:null, duration:null, emails:[], title:CONFIG.titleTemplate };
}

async function cancelFlow() {
  appendMsg('Cancelar','user');
  flow = { step:'idle', date:null, time:null, duration:null, emails:[], title:CONFIG.titleTemplate };
  await botReply('Agendamento cancelado. Como posso ajudar?', 400);
}

// ═══════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════
async function handleSend() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = ''; input.style.height = 'auto';
  appendMsg(msg, 'user');

  if (flow.step==='collect_emails')   { await handleEmailStep(msg); return; }
  if (flow.step==='collect_duration') { if(/30|meia/.test(msg)) durationChosen(0.5); else if(/1|hora|60/.test(msg)) durationChosen(1); else await botReply('Escolha **30 minutos** ou **1 hora**.'); return; }
  if (flow.step==='collect_title')    { flow.title=msg; flow.step='confirm'; await showConfirmation(); return; }
  if (flow.step==='choose_slot') {
    const t = parseTimeFromMsg(msg);
    if (t!==null&&flow.date) { await attemptBook(flow.date,t); return; }
    const d = parseDateFromMsg(msg);
    if (d) { flow.date=toISO(d); const res=await apiSlots(flow.date); await botReply(`${fmtDate(flow.date)}<br>${slotsHtml(res.slots,flow.date)}`,500); return; }
  }
  await handleQuery(msg);
}

function quickSend(msg) { document.getElementById('userInput').value=msg; handleSend(); }

// textarea auto-resize
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

  await botReply(`Olá! Sou o assistente de agendamento da **WFlow**.<br><br>
    Posso verificar disponibilidade e agendar reuniões diretamente na agenda. Como posso ajudar?`, 600);
});
